{% extends 'base.html' %}
{% load static %}

{% block content %}
<main class="register-page">
  <div class="register-layout">
    <section class="register-left" aria-label="Register form">
      <div class="register-container">
        <header class="register-header">
          <a class="brand" href="{% url 'index' %}" aria-label="2LSN home">
            <img src="{% static 'img/mainlogo.png' %}" alt="2LSN">
          </a>
        </header>

        <h2 class="register-title">Create Account</h2>

        <form method="post" novalidate>
          {% csrf_token %}

          <div class="form-group">
            <input type="text" id="first_name" name="first_name" placeholder=" " required autocomplete="given-name">
            <label for="first_name">First name</label>
          </div>

          <div class="form-group">
            <input type="text" id="last_name" name="last_name" placeholder=" " required autocomplete="family-name">
            <label for="last_name">Last name</label>
          </div>

          <div class="form-group">
            <input type="email" id="email" name="email" placeholder=" " required autocomplete="email">
            <label for="email">Email</label>
          </div>

          <div class="form-group">
            <input type="password" id="password1" name="password1" placeholder=" " required autocomplete="new-password">
            <label for="password1">Password</label>
          </div>

          <div class="form-group">
            <input type="password" id="password2" name="password2" placeholder=" " required autocomplete="new-password">
            <label for="password2">Confirm password</label>
          </div>

          <button type="submit" class="btn">Register</button>

          <div class="divider">or</div>

          <p class="section-label">Access with</p>
          <button class="btn btn-social" id="google-button" type="button" aria-label="Continue with Google">
            <svg width="15" height="15" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
          </button>

          <div class="register-footer" style="margin-top: 1.5rem;">
            {% if user.is_authenticated %}
              <a href="{% url 'dashboard' %}">Dashboard</a>
            {% else %}
              <a href="{% url 'login' %}">Login</a>
            {% endif %}

            <a href="{% url 'index' %}">Back to Home</a>
          </div>
        </form>
      </div>
    </section>

    <section class="register-right" aria-label="Register image">
      <img class="register-img" src="{% static 'img/product1.png' %}" alt="2LSN">
    </section>
  </div>
</main>
{% endblock content %}

{% block script %}
<script type="module" src="{% static 'main.js' %}"></script>
{% endblock script %}
