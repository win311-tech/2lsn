{%extends 'base.html' %}
{% block content %}
{% load static %}
<head>
    <title>Log In 2LSN</title>
<body class="login-page">

    <div class="login-editorial">
     <img src="{% static 'img/product1.png' %}" alt="2LSN Product Image">
    </div>

    <div class="login-bottom">

        <div class="login-brand-col">
            <h1 class="login-brand-heading">
                <a href="{% url 'index' %}" class="login-brand">2LSN</a>
            </h1>
        </div>

        <div class="login-form-col">
            <main class="login-container">

                <h2 class="login-title">Log in</h2>

                <form class="login-form" method="post" novalidate>
                    {% csrf_token %}
                    <div class="form-group">
                        <input type="email" id="email" name="email" placeholder=" " required autocomplete="email">
                        <label for="email">Email</label>
                    </div>
                    <div class="form-group">
                        <input type="password" id="password" name="password" placeholder=" " required autocomplete="new-password">
                        <label for="password">Password</label>
                    </div>
                    <label class="remember-row">
                        <input type="checkbox" name="remember">
                        <span>Remember me</span>
                    </label>
                    <button type="submit" class="btn">Continue</button>
                </form>

                <div class="divider">or</div>

                <p class="section-label">Access with</p>
                <button class="btn btn-social" type="button" aria-label="Continue with Google">
                    Continue with Google
                </button>

                <div class="login-footer">
                    <a href="{% url 'register' %}">Don't have an account? Register</a>
                </div>

            </main>
        </div>

    </div>

</body>
{% endblock content %}
